<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMersWallet - Asisten Keuangan Pribadi & Bisnis</title>
    <!-- Tailwind CSS untuk Desain Responsif & Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ApexCharts untuk Visualisasi Data Finansial -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <!-- Lucide Icons untuk Ikon Premium Modern -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Font Plus Jakarta Sans Premium dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dana-blue: #108EE9; 
            --dana-dark: #0B5ED7;
            --dana-light: #F5F9FF;
            --emerald: #10B981;
            --rose: #F43F5E;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--dana-light); 
            color: #1E293B; 
        }
        .bg-dana { background-color: var(--dana-blue); }
        .bg-dana-dark { background-color: var(--dana-dark); }
        .text-dana { color: var(--dana-blue); }
        
        /* Bayangan Kartu Premium ala Fintech */
        .card-shadow { 
            box-shadow: 0 20px 35px -5px rgba(16, 142, 233, 0.05), 0 10px 15px -5px rgba(16, 142, 233, 0.02); 
        }
        .bottom-nav { 
            box-shadow: 0 -5px 30px rgba(16, 142, 233, 0.08); 
        }
        
        /* Animasi Transisi Halaman */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Animasi Getar untuk PIN Salah */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }

        /* Logo transparan: jangan kasih background/card putih di area image */
        .logo-transparent-wrap {
            background: transparent !important;
            box-shadow: none !important;
            border: 0 !important;
            overflow: visible !important;
        }
        .logo-transparent-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            mix-blend-mode: normal;
        }
        #lockscreen-logo-container img {
            background: transparent !important;
            box-shadow: none !important;
            border: 0 !important;
        }
    </style>
</head>
<body class="pb-24 lg:pb-0 min-h-screen flex flex-col lg:flex-row font-sans">

    <!-- SCREEN LOCK PIN 6-DIGIT (Gaya Aplikasi HP Finansial Aman) -->
    <div id="pin-lockscreen" class="fixed inset-0 bg-slate-900/95 z-[150] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm flex flex-col items-center space-y-8 animate-fade" id="pin-container-box">
            
            <!-- Input Rahasia Asli (Memicu keyboard fisik/bawaan HP) -->
            <input type="password" id="real-pin-input" class="absolute -top-40 opacity-0 w-1 h-1 pointer-events-none" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off" oninput="handlePinInput(this.value)">

            <div class="text-center space-y-2">
                <!-- LOGO DINAMIS PADA LOCKSCREEN -->
                <div id="lockscreen-logo-container" class="cursor-pointer flex justify-center w-full" onclick="focusPinInput()">
                    <!-- Diisi otomatis oleh fungsi renderLogo() -->
                </div>
                <h2 class="text-3xl font-black mt-4"><span class="text-[#108EE9]">iMers</span><span class="text-[#00E5FF]">WALLET</span></h2>
                <p class="text-sm text-slate-300 font-medium">Masukkan PIN 6-Digit</p>
            </div>

            <!-- Titik Penunjuk PIN (Mengetuk area ini akan fokus ke input HP) -->
            <div class="flex gap-4 justify-center py-4 cursor-pointer" id="pin-dots" onclick="focusPinInput()">
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
                <div class="w-4 h-4 rounded-full border-2 border-slate-600 transition-all duration-150"></div>
            </div>

            <!-- Tombol Keypad Numerik Statis (Responsif & Anti-Freeze) -->
            <div class="grid grid-cols-3 gap-6 w-full max-w-[280px]">
                <button onclick="pressPinNumber(1)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">1</button>
                <button onclick="pressPinNumber(2)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">2</button>
                <button onclick="pressPinNumber(3)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">3</button>
                
                <button onclick="pressPinNumber(4)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">4</button>
                <button onclick="pressPinNumber(5)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">5</button>
                <button onclick="pressPinNumber(6)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">6</button>
                
                <button onclick="pressPinNumber(7)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">7</button>
                <button onclick="pressPinNumber(8)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">8</button>
                <button onclick="pressPinNumber(9)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">9</button>
                
                <button onclick="clearPin()" class="w-16 h-16 rounded-full text-slate-400 font-bold text-xs flex items-center justify-center hover:bg-slate-800/50 active:scale-95 transition-all outline-none font-sans">Hapus</button>
                <button onclick="pressPinNumber(0)" class="w-16 h-16 rounded-full bg-slate-800 text-white font-black text-xl flex items-center justify-center hover:bg-slate-700 active:scale-95 transition-all outline-none">0</button>
                <button onclick="backspacePin()" class="w-16 h-16 rounded-full text-rose-500 font-bold flex items-center justify-center hover:bg-rose-500/10 active:scale-95 transition-all outline-none">
                    <i data-lucide="delete" class="w-6 h-6 mx-auto"></i>
                </button>
            </div>

            <!-- Opsi Bantuan Jika Lupa PIN -->
            <div class="text-center pt-2">
                <button onclick="requestForgotPin()" class="text-xs text-dana hover:text-blue-300 font-bold tracking-wide transition-colors flex items-center gap-1.5 mx-auto">
                    <i data-lucide="key-round" class="w-3.5 h-3.5"></i> Lupa PIN? Kirim via WA/Telegram & Email
                </button>
            </div>
        </div>
    </div>

    <!-- Sidebar Desktop (Hanya muncul di Desktop / Tablet Besar) -->
    <aside class="hidden lg:flex flex-col w-72 bg-white border-r border-slate-100 p-6 space-y-8 min-h-screen shrink-0">
        <!-- HEADER LOGO DINAMIS SIDEBAR -->
        <div class="flex items-center gap-3 px-2">
            <div id="sidebar-logo-container" class="flex justify-center shrink-0">
                <!-- Diisi otomatis oleh renderLogo() -->
            </div>
            <span class="text-xl font-extrabold tracking-tight text-slate-900">iMers<span class="text-dana">Wallet</span></span>
        </div>

        <!-- Menu Navigasi Utama -->
        <nav class="flex-1 space-y-1">
            <button onclick="router('home')" id="side-home" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-dana bg-blue-50/50 transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span>Dashboard Utama</span>
            </button>
            <button onclick="router('history')" id="side-history" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span>Riwayat Transaksi</span>
            </button>
            <button onclick="router('analytics')" id="side-analytics" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span>Analisis Pengeluaran</span>
            </button>
            <button onclick="router('profile')" id="side-profile" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span>Bot WA/Telegram & Pengaturan</span>
            </button>
            
            <!-- Tombol Keluar Sesi Desktop -->
            <button onclick="logout()" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-bold text-sm text-rose-500 hover:bg-rose-50 transition-all mt-4">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Keluar Sesi</span>
            </button>
        </nav>

        <!-- Box Bot Info Pencatatan Cepat -->
        <div class="bg-blue-50/70 rounded-3xl p-5 space-y-3">
            <div class="flex items-center gap-2 text-dana">
                <i data-lucide="sparkles" class="w-5 h-5 animate-pulse"></i>
                <span class="text-xs font-bold uppercase tracking-wider">Catat Cepat</span>
            </div>
            <p class="text-xs text-slate-500 font-medium leading-relaxed font-semibold">Kirim chat ke bot via WhatsApp atau Telegram untuk mencatat pemasukan/pengeluaran secara instan.</p>
            <a id="desktop-wa-btn" href="#" target="_blank" class="w-full py-2.5 bg-dana hover:bg-dana-dark text-white rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition-all shadow-md shadow-blue-100">
                <i data-lucide="message-square" class="w-4 h-4"></i> Chat WhatsApp
            </a>
            <button onclick="router('profile')" class="w-full py-2.5 bg-sky-500 hover:bg-sky-600 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition-all shadow-md shadow-sky-100">
                <i data-lucide="send" class="w-4 h-4"></i> Setup Telegram
            </button>
        </div>
    </aside>

    <!-- Area Utama Tempat Menampilkan Halaman Dinamis -->
    <main class="flex-1 min-w-0">
        <div id="app" class="w-full">
            <!-- Skrin Loader Saat Menghubungkan Apps Script -->
            <div id="global-loader" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-12 h-12 border-4 border-blue-100 border-t-dana rounded-full animate-spin"></div>
                    <p class="text-sm font-bold text-gray-500">Menghubungkan Pangkalan Data iMersWallet...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigasi Bawah Khusus HP (Mobile Bottom Navigation) -->
    <nav id="navbar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center py-4 z-50 lg:hidden bottom-nav rounded-t-[32px]">
        <button onclick="router('home')" id="nav-home" class="flex flex-col items-center gap-1 text-dana transition-all">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Utama</span>
        </button>
        <button onclick="router('history')" id="nav-history" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Riwayat</span>
        </button>
        
        <!-- FAB Floating Button Tambah Transaksi -->
        <div class="relative -top-8">
            <button onclick="openModal('addTransaction')" class="w-14 h-14 bg-dana hover:bg-dana-dark text-white rounded-full shadow-lg shadow-blue-200 border-4 border-white flex items-center justify-center hover:scale-105 transition-all">
                <i data-lucide="plus" class="w-7 h-7"></i>
            </button>
        </div>
        
        <button onclick="router('analytics')" id="nav-analytics" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="pie-chart" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Analisis</span>
        </button>
        <button onclick="router('profile')" id="nav-profile" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[9px] font-bold">Bot</span>
        </button>
    </nav>

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed top-6 right-6 z-[120] bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 transition-all duration-300 translate-y-[-100px] opacity-0 pointer-events-none">
        <div class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center animate-pulse" id="toast-icon-box">
            <i data-lucide="check" class="w-3 h-3 text-white"></i>
        </div>
        <p id="toast-message" class="text-sm font-semibold"></p>
    </div>

    <!-- Modal Base Container -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 z-[110] hidden backdrop-blur-xs items-center justify-center p-4">
        <div id="modal-box" class="bg-white w-full max-w-md rounded-[32px] p-6 shadow-2xl transition-all duration-300 scale-95 opacity-0">
            <!-- Isi modal dinonaktifkan / dirender dinamis di sini -->
        </div>
    </div>

    <script>
        // --- DATA DUMMY SEBAGAI CADANGAN JIKA OFFLINE ---
        const DUMMY_DATA = {
            stats: { 
                balance: 5440000, 
                income: 6200000, 
                expense: 760000 
            },
            transactions: [
                { date: "2026-05-01", type: "income", category: "Gaji", amount: 5000000, note: "Gaji Bulanan", wallet: "Pribadi", source: "dummy" },
                { date: "2026-05-02", type: "expense", category: "Makanan", amount: 85000, note: "Makan siang & kopi", wallet: "Pribadi", source: "dummy" },
                { date: "2026-05-03", type: "expense", category: "Transportasi", amount: 50000, note: "Bensin motor", wallet: "Pribadi", source: "dummy" },
                { date: "2026-05-05", type: "expense", category: "Tagihan", amount: 350000, note: "Bayar internet", wallet: "Pribadi", source: "dummy" },
                { date: "2026-05-07", type: "income", category: "Freelance", amount: 1200000, note: "Project desain web", wallet: "Bisnis", source: "dummy" },
                { date: "2026-05-09", type: "expense", category: "Belanja", amount: 275000, note: "Belanja dapur bulanan", wallet: "Pribadi", source: "dummy" }
            ],
            budgets: {
                "Makanan": 1000000,
                "Transportasi": 500000,
                "Tagihan": 1500000,
                "Belanja": 2000000
            },
            settings: {
                FONNTE_TOKEN: "",
                FONNTE_BOT_NUMBER: "",
                BOT_NUMBER: "628123456789",
                ACTIVE_WA_PROVIDER: "fonnte",
                XSENDER_API_KEY: "",
                XSENDER_SENDER: "",
                XSENDER_FOOTER: "Sent via iMersWallet",
                XSENDER_ENDPOINT: "https://xsender.id/send-message",
                STARSENDER_API_KEY: "",
                STARSENDER_ENDPOINT: "https://app.starsender.online/api/v3/send",
                STARSENDER_API_VERSION: "v3",
                TELEGRAM_BOT_TOKEN: "",
                TELEGRAM_ADMIN_CHAT_ID: "",
                TELEGRAM_ADMIN_USER_ID: "",
                ACTIVE_BOT_CHANNEL: "both",
                USER_EMAIL: "owner@example.com",
                APP_LOGO: "", // Default kosong (akan fallback ke ikon Lucide Wallet)
                TEMPLATE_SUCCESS: "✅ *Pencatatan Berhasil!*\n\n📂 *KANTONG: {wallet}*\n💰 *TIPE: {type}*\n📝 Kategori: {category}\n💬 Catatan: {note}\n💸 Nominal: *Rp{amount}*",
                TEMPLATE_OVER_BUDGET: "⚠️ *WARNING BUDGET JEBOL!* ⚠️\n\nPengeluaran Anda pada kategori *{category}* telah melebihi batas anggaran bulanan!\n\n💸 Terpakai: *Rp{spent}*\n📊 Batas Anggaran: *Rp{limit}*",
                TEMPLATE_WARN_BUDGET: "⚠️ *PERINGATAN HEMAT!* ⚠️\n\nPengeluaran kategori *{category}* sudah mencapai *{ratio}%* dari batas anggaran bulanan Anda.",
                TEMPLATE_WEEKLY_REPORT: "📊 *LAPORAN MINGGUAN iMersWallet* 📊\n\n📈 Pemasukan: *Rp{income}*\n📉 Pengeluaran: *Rp{expense}*"
            }
        };

        // --- KONFIGURASI REST API GOOGLE SHEETS (SINKRON TAUTAN TERBARU) ---
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbz36WJD6VbLWMhq0qc7MnTxVZrpbCxBk9vEeNED9pvo2XTkf1rN5TP6pU-nXTJBpCYI/exec",
            BOT_NUMBER: "628123456789",
            ACTIVE_BOT_CHANNEL: "both"
        };

        // --- PEMETAAN IKON KATEGORI TRANSAKSI (Definisi Awal) ---
        const CATEGORY_ICONS = {
            'Gaji': { icon: 'briefcase', bg: 'bg-green-100', text: 'text-green-600' },
            'Freelance': { icon: 'award', bg: 'bg-emerald-100', text: 'text-emerald-600' },
            'Makanan': { icon: 'coffee', bg: 'bg-amber-100', text: 'text-amber-600' },
            'Transportasi': { icon: 'car', bg: 'bg-blue-100', text: 'text-blue-600' },
            'Tagihan': { icon: 'lightning', bg: 'bg-purple-100', text: 'text-purple-600' },
            'Belanja': { icon: 'shopping-bag', bg: 'bg-rose-100', text: 'text-rose-600' },
            'Pendidikan': { icon: 'book-open', bg: 'bg-indigo-100', text: 'text-indigo-600' },
            'Kesehatan': { icon: 'heart', bg: 'bg-red-100', text: 'text-red-600' },
            'Lainnya': { icon: 'more-horizontal', bg: 'bg-slate-100', text: 'text-slate-600' }
        };

        // --- SISTEM NOTIFIKASI TOAST (Definisi Awal) ---
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIconBox = document.getElementById('toast-icon-box');
            
            toastMsg.innerText = message;
            if (type === "success") {
                toastIconBox.className = "w-5 h-5 bg-green-500 rounded-full flex items-center justify-center shrink-0 animate-pulse";
                toastIconBox.innerHTML = `<i data-lucide="check" class="w-3 h-3 text-white"></i>`;
            } else {
                toastIconBox.className = "w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center shrink-0";
                toastIconBox.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-white"></i>`;
            }
            
            lucide.createIcons();
            toast.classList.remove('translate-y-[-100px]', 'opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('translate-y-[-100px]', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

        let state = {
            view: 'home',
            data: JSON.parse(JSON.stringify(DUMMY_DATA)),
            isUsingDemo: true,
            subTab: 'daily', // Sub-tabs: daily, calendar, yearly, budget
            isLoading: false,
            enteredPin: "",
            preloadedDashboard: null
        };

        const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);

        // --- RENDER LOGO DINAMIS (Logo Kustom / Ikon Dompet Default) ---
        // MEMBUAT LOGO TRANSPARAN BEBAS DARI BACKGROUND PUTIH KOTAK
        function renderLogo(sizeClass = "w-10 h-10", iconSize = "w-5 h-5") {
            const logoUrl = state.data.settings.APP_LOGO || "";
            const isLockscreenLogo = sizeClass.includes("w-24") || sizeClass.includes("h-24") || sizeClass.includes("w-20") || sizeClass.includes("h-20");

            if (logoUrl && logoUrl.trim() !== "" && logoUrl.startsWith("http")) {
                return `
                    <div class="relative ${sizeClass} mx-auto flex items-center justify-center logo-transparent-wrap">
                        <img 
                            src="${logoUrl}" 
                            class="logo-transparent-img ${isLockscreenLogo ? 'scale-[1.35]' : 'scale-[1.08]'}" 
                            alt="Logo iMersWallet" 
                            onerror="handleLogoError(this, '${sizeClass}', '${iconSize}')"
                        >
                    </div>
                `;
            }

            return `<div class="${sizeClass} mx-auto bg-dana rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200"><i data-lucide="wallet" class="${iconSize}"></i></div>`;
        }

        function handleLogoError(imgElement, sizeClass, iconSize) {
            const container = imgElement.parentElement;
            if (container) {
                container.innerHTML = `<div class="${sizeClass} mx-auto bg-dana rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200"><i data-lucide="wallet" class="${iconSize}"></i></div>`;
                lucide.createIcons();
            }
        }

        function updateLogosInUI() {
            const sidebarContainer = document.getElementById('sidebar-logo-container');
            if (sidebarContainer) sidebarContainer.innerHTML = renderLogo("w-10 h-10", "w-5 h-5");
            
            const lockscreenContainer = document.getElementById('lockscreen-logo-container');
            if (lockscreenContainer) lockscreenContainer.innerHTML = renderLogo("w-24 h-24", "w-10 h-10");
            
            lucide.createIcons();
        }

        // --- PENGELOLAAN SISTEM PIN KEAMANAN ---
        function focusPinInput() {
            const input = document.getElementById('real-pin-input');
            if (input) {
                input.focus();
            }
        }

        // Penanganan input dari keyboard bawaan ponsel
        function handlePinInput(val) {
            val = val.replace(/[^0-9]/g, '');
            
            if (val.length > 6) {
                val = val.slice(0, 6);
            }
            
            state.enteredPin = val;
            
            // Sinkronkan kembali nilai input text tersembunyi dengan state
            const input = document.getElementById('real-pin-input');
            if (input && input.value !== val) {
                input.value = val;
            }
            
            updatePinIndicators();
            
            if (state.enteredPin.length === 6) {
                verifyPin();
            }
        }

        function pressPinNumber(num) {

        // --- FETCH DENGAN TIMEOUT HELPER ---
        // MENINGKATKAN TIMEOUT KE 15 DETIK AGAR COLD START SPREADSHEET GOOGLE TIDAK MEMBUAT SINKRONISASI MATI
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 15000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(resource, {
                    ...options,
                    signal: controller.signal  
                });
                clearTimeout(id);
                return response;
            } catch (err) {
                clearTimeout(id);
                throw err;
            }
        }

        function applyBrandingSettings(settings = {}) {
            if (!settings) return;

            if (settings.APP_LOGO && String(settings.APP_LOGO).trim() !== "") {
                state.data.settings.APP_LOGO = String(settings.APP_LOGO).trim();
                try {
                    localStorage.setItem('imerswallet_app_logo', state.data.settings.APP_LOGO);
                } catch (e) {}
            }

            if (settings.BOT_NUMBER && String(settings.BOT_NUMBER).trim() !== "") {
                CONFIG.BOT_NUMBER = String(settings.BOT_NUMBER).trim();
                try {
                    localStorage.setItem('imerswallet_bot_number', CONFIG.BOT_NUMBER);
                } catch (e) {}

                const desktopWaBtn = document.getElementById('desktop-wa-btn');
                if (desktopWaBtn) desktopWaBtn.href = `https://wa.me/${CONFIG.BOT_NUMBER}`;
            }

            if (settings.ACTIVE_BOT_CHANNEL && String(settings.ACTIVE_BOT_CHANNEL).trim() !== "") {
                try {
                    localStorage.setItem('imerswallet_active_bot_channel', String(settings.ACTIVE_BOT_CHANNEL).trim());
                } catch (e) {}
            }

            updateLogosInUI();
        }

            try {

                if (result && result.status === 'success') {
                    state.data = result;
                    state.isUsingDemo = false;
                    CONFIG.BOT_NUMBER = result.settings.BOT_NUMBER || CONFIG.BOT_NUMBER;

        function filterHistory() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const typeVal = document.getElementById('type-filter').value;
            const rows = document.querySelectorAll('#history-table-body tr');
            
            rows.forEach(row => {
                const type = row.getAttribute('data-type');
                const note = row.getAttribute('data-note');
                const matchSearch = note.includes(searchVal);
                const matchType = (typeVal === 'all' || type === typeVal);
                if (matchSearch && matchType) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        }

        // MENAMBAH VALIDASI CEK KEUTUHAN JALUR URL GAS AGAR TIDAK SALAH COPAST SECARA TRUNCATED
        async function saveAllSettings() {
            const apiVal = document.getElementById('cfg-api-url').value.trim();
            const tokenVal = document.getElementById('cfg-fonnte-token')?.value.trim() || '';
            const fonnteBotNumberVal = document.getElementById('cfg-fonnte-bot-number')?.value.trim() || '';
            const botVal = document.getElementById('cfg-bot-number')?.value.trim() || '';
            const activeProviderVal = document.getElementById('cfg-active-wa-provider')?.value || 'fonnte';

            const xsenderApiKeyVal = document.getElementById('cfg-xsender-api-key')?.value.trim() || '';
            const xsenderSenderVal = document.getElementById('cfg-xsender-sender')?.value.trim() || '';
            const xsenderEndpointVal = document.getElementById('cfg-xsender-endpoint')?.value.trim() || 'https://xsender.id/send-message';
            const xsenderFooterVal = document.getElementById('cfg-xsender-footer')?.value.trim() || 'Sent via iMersWallet';

            const starsenderApiKeyVal = document.getElementById('cfg-starsender-api-key')?.value.trim() || '';
            const starsenderEndpointVal = document.getElementById('cfg-starsender-endpoint')?.value.trim() || 'https://app.starsender.online/api/v3/send';
            const starsenderVersionVal = document.getElementById('cfg-starsender-version')?.value.trim() || 'v3';

            const telegramTokenVal = document.getElementById('cfg-telegram-token')?.value.trim() || '';
            const telegramChatIdVal = document.getElementById('cfg-telegram-chat-id')?.value.trim() || '';
            const telegramUserIdVal = document.getElementById('cfg-telegram-user-id')?.value.trim() || '';
            const activeChannelVal = document.getElementById('cfg-active-channel')?.value || 'both';
            const logoVal = document.getElementById('cfg-app-logo').value.trim();
            const emailVal = document.getElementById('cfg-user-email').value.trim();
            const pinVal = document.getElementById('cfg-user-pin').value.trim();

            const tmplSuccess = document.getElementById('tmpl-success').value;
            const tmplOverBudget = document.getElementById('tmpl-over-budget').value;
            const tmplWarnBudget = document.getElementById('tmpl-warn-budget').value;
            const tmplWeekly = document.getElementById('tmpl-weekly').value;

            if (apiVal) {
                if (!apiVal.startsWith("https://script.google.com/") || !apiVal.includes("/exec")) {
                    return showToast("URL Apps Script tidak valid! Pastikan diakhiri dengan /exec", "warn");
                }
                CONFIG.API_URL = apiVal;
            }

            const queryParams = new URLSearchParams({
                action: 'saveSettings',
                fonnte_token: tokenVal,
                fonnte_bot_number: fonnteBotNumberVal,
                bot_number: botVal,
                active_wa_provider: activeProviderVal,

                xsender_api_key: xsenderApiKeyVal,
                xsender_sender: xsenderSenderVal,
                xsender_endpoint: xsenderEndpointVal,
                xsender_footer: xsenderFooterVal,

                starsender_api_key: starsenderApiKeyVal,
                starsender_endpoint: starsenderEndpointVal,
                starsender_api_version: starsenderVersionVal,

                telegram_bot_token: telegramTokenVal,
                telegram_admin_chat_id: telegramChatIdVal,
                telegram_admin_user_id: telegramUserIdVal,
                active_bot_channel: activeChannelVal,
                app_logo: logoVal,
                user_email: emailVal,
                user_pin: pinVal,
                template_success: tmplSuccess,
                template_over_budget: tmplOverBudget,
                template_warn_budget: tmplWarnBudget,
                template_weekly_report: tmplWeekly
            });

            showToast("Menyimpan pengaturan hybrid bot...", "success");

            try {
                const response = await fetchWithTimeout(`${CONFIG.API_URL}?${queryParams.toString()}`, { timeout: 20000 });
                const result = await response.json();
                if (result && result.status === 'success') {
                    showToast("Semua konfigurasi berhasil disimpan!", "success");
                    fetchDashboardData();
                } else {
                    throw new Error(result?.message || "Gagal menyimpan");
                }
            } catch (err) {
                state.data.settings.APP_LOGO = logoVal;
                state.data.settings.ACTIVE_BOT_CHANNEL = activeChannelVal;
                state.data.settings.ACTIVE_WA_PROVIDER = activeProviderVal;
                updateLogosInUI();
                showToast("Simpan gagal. Cek URL Apps Script / deployment.", "warn");
            }
        }

        function submitManualTransaction() {
            const amount = parseInt(document.getElementById('tx-amount').value);
            const category = document.getElementById('tx-category').value;
            const wallet = document.getElementById('tx-wallet').value;
            const note = document.getElementById('tx-note').value || category;
            
            if (isNaN(amount) || amount <= 0) return showToast("Nominal tidak valid", "warn");

            const item = {
                date: new Date().toISOString().slice(0, 10),
                type: state.modalType,
                category,
                amount,
                note,
                wallet: wallet
            };

            state.data.transactions.push(item);
            
            // Rekalkulasi data tempatan secara langsung untuk kelajuan prestasi antarmuka
            const inc = state.data.transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.amount, 0);
            const exp = state.data.transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
            state.data.stats = { balance: inc - exp, income: inc, expense: exp };

            closeModal();
            showToast("Transaksi Berhasil Direkam!", "success");
            render();
        }

            state.data.budgets[cat] = limit;
            closeModal();
            showToast(`Batas Anggaran Kategori ${cat} Diperbarui!`, "success");
            render();
        }

            setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 200);
        }

        // --- PENYEDIAAN UTAMA SEWAKTU SKRIN DIMUAT ---
        window.onload = async () => {
            const desktopWaBtn = document.getElementById('desktop-wa-btn');
            if (desktopWaBtn) desktopWaBtn.href = `https://wa.me/${CONFIG.BOT_NUMBER}`;

            // Muat logo dari cache/localStorage secepat mungkin supaya lockscreen tidak tampil logo dummy.
            hydrateCachedBranding();

            // Refresh logo dari Google Sheets bahkan sebelum PIN dimasukkan.
            const brandingPromise = preloadBrandingBeforePin();

            // Periksa sekiranya PIN keselamatan telah disahkan sebelum ini
            if (sessionStorage.getItem('authenticated_pin') === 'true') {
                document.getElementById('pin-lockscreen').classList.add('hidden');
                await brandingPromise;
                fetchDashboardData();
            } else {
                document.getElementById('global-loader').classList.add('hidden');
                await brandingPromise;
                // Fokus pada input secara otomatis setelah logo cloud selesai dicoba.
                setTimeout(focusPinInput, 300);
            }
        };
    </script>
</body>
</html>
